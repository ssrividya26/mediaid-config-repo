server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/payment_service_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.cloud.openfeign.circuitbreaker.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

## FEIGN HTTP CLIENT (HC5 supports PATCH; default HttpURLConnection does not)
spring.cloud.openfeign.httpclient.hc5.enabled=true

resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.sliding-window-size=10
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.register-health-indicator=true
resilience4j.circuitbreaker.instances.DISBURSEMENT-SERVICE.ignoreExceptions=\
  com.mediaid.payment.exception.ResourceNotFoundException,\
  com.mediaid.payment.exception.BadRequestException

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit breaker ? audit-management-service (payment audit logging)
resilience4j.circuitbreaker.instances.audit-management-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.audit-management-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.audit-management-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.audit-management-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.audit-management-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.audit-management-service.automatic-transition-from-open-to-half-open-enabled=true
