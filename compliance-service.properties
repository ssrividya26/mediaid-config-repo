server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/compliance_service_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.cts.compliance

spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit breaker for write-back calls to audit-management-service
resilience4j.circuitbreaker.instances.audit-management-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.audit-management-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.audit-management-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.audit-management-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.audit-management-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.audit-management-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.audit-management-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.audit-management-service.ignoreExceptions=\
  com.cts.compliance.exception.ResourceNotFoundException,\
  com.cts.compliance.exception.BadRequestException

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

