server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/disbursement_service_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.cloud.openfeign.circuitbreaker.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

resilience4j.circuitbreaker.instances.CLAIM-SERVICE.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.sliding-window-size=10
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.register-health-indicator=true
resilience4j.circuitbreaker.instances.CLAIM-SERVICE.ignoreExceptions=\
  com.mediaid.disbursement.exception.ResourceNotFoundException,\
  com.mediaid.disbursement.exception.BadRequestException

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit breaker ? audit-management-service (audit log writes after disbursement events)
resilience4j.circuitbreaker.instances.audit-management-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.audit-management-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.audit-management-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.audit-management-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.audit-management-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.audit-management-service.automatic-transition-from-open-to-half-open-enabled=true

# Circuit breaker ? compliance-service (auto-evaluation on disbursement creation)
resilience4j.circuitbreaker.instances.compliance-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.compliance-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.compliance-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.compliance-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.compliance-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.compliance-service.automatic-transition-from-open-to-half-open-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoint.health.show-details=always
management.info.env.enabled=true

