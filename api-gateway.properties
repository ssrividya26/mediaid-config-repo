spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888

# Handled by JwtAuthenticationFilter (GlobalFilter, runs at HIGHEST_PRECEDENCE).
#
# PUBLIC  (no token required):
#   /api/auth/**
#   /api/audit/internal/**
#   /api/audit-management/internal/**
#   /api/compliance/evaluate   (exact)
#   /swagger-ui/**,  /v3/api-docs/**
#
# PROTECTED (Bearer token required): everything else

# lb:// resolves service names via Eureka (load-balanced).
# To bypass Eureka, replace lb://<name> with http://localhost:<port>.

# 0 Â· Auth Service  â PUBLIC
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 1 Â· User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

# 2 Â· Audit Service
spring.cloud.gateway.routes[2].id=audit-service
spring.cloud.gateway.routes[2].uri=lb://audit-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/audit/**,/api/audits/**

# 3 Â· Audit Management Service
spring.cloud.gateway.routes[3].id=audit-management-service
spring.cloud.gateway.routes[3].uri=lb://audit-management-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/audit-management/**

# 4 Â· Citizen Service  (citizens + documents)
spring.cloud.gateway.routes[4].id=citizen-service
spring.cloud.gateway.routes[4].uri=lb://citizen-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/citizens/**,/api/documents/**

# 5 Â· Scheme Service
spring.cloud.gateway.routes[5].id=scheme-service
spring.cloud.gateway.routes[5].uri=lb://scheme-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/schemes/**

# 6 Â· Enrollment Service
spring.cloud.gateway.routes[6].id=enrollment-service
spring.cloud.gateway.routes[6].uri=lb://enrollment-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/enrollments/**

# 7 Â· Claim Service
spring.cloud.gateway.routes[7].id=claim-service
spring.cloud.gateway.routes[7].uri=lb://claim-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/claims/**

# 8 Â· Disbursement Service
spring.cloud.gateway.routes[8].id=disbursement-service
spring.cloud.gateway.routes[8].uri=lb://disbursement-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/disbursement/**

# 9 Â· Payment Service
spring.cloud.gateway.routes[9].id=payment-service
spring.cloud.gateway.routes[9].uri=lb://payment-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/payment/**

# 10 Â· Compliance Service
spring.cloud.gateway.routes[10].id=compliance-service
spring.cloud.gateway.routes[10].uri=lb://compliance-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/compliance/**

# (served from config-server; uncomment as local fallback if config-server is down)
# eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# eureka.instance.prefer-ip-address=true
