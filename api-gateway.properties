server.port=9090
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#SchemeService
spring.cloud.gateway.server.webmvc.routes[0].id=SCHEME-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://SCHEME-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/schemes/**

#EnrollmentService
spring.cloud.gateway.server.webmvc.routes[1].id=ENROLLMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ENROLLMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/enrollments/**

#ClaimService
spring.cloud.gateway.server.webmvc.routes[2].id=CLAIM-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://CLAIM-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/claims/**


#  - Disbursement Service
spring.cloud.gateway.routes[3].id=disbursement-service
spring.cloud.gateway.routes[3].uri=lb://disbursement-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/disbursement/**
#spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/disbursement/(?<segment>.*), /api/disbursement/${segment}

# - Payment Service
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payment/**
#spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/payment/(?<segment>.*), /api/payment/${segment}

