server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/enrollment_service_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.cloud.openfeign.circuitbreaker.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


#resilience4j.circuitbreaker.instances.SCHEME-SERVICE.ignoreExceptions=\
 # com.cts.enrollment_service.exception.ResourceNotFoundException,\
  #com.cts.enrollment_service.exception.BadRequestException

# TimeLimiter for SchemeClient (fixes the WARN and the 1s timeout)
resilience4j.timelimiter.instances.SchemeClientgetSchemeByIdLong.timeout-duration=5s
resilience4j.timelimiter.instances.SchemeClientgetSchemeByIdLong.cancel-running-future=true

# Circuit breaker under the same name
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.sliding-window-size=10
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.register-health-indicator=true
resilience4j.circuitbreaker.instances.SchemeClientgetSchemeByIdLong.ignore-exceptions=com.cts.enrollment_service.exception.ResourceNotFoundException,com.cts.enrollment_service.exception.BadRequestException

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit breaker ? audit-management-service
resilience4j.circuitbreaker.instances.audit-management-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.audit-management-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.audit-management-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.audit-management-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.audit-management-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.audit-management-service.automatic-transition-from-open-to-half-open-enabled=true

# Circuit breaker ? compliance-service (POLICY evaluation on enrollment approval)
resilience4j.circuitbreaker.instances.compliance-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.compliance-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.compliance-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.compliance-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.compliance-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.compliance-service.automatic-transition-from-open-to-half-open-enabled=true
