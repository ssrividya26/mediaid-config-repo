server.port=8086
spring.datasource.url=jdbc:mysql://localhost:3306/enrollment_service_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Feign circuit breaker disabled — handled manually via @CircuitBreaker
spring.cloud.openfeign.circuitbreaker.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# TimeLimiter — SCHEME-SERVICE
resilience4j.timelimiter.instances.SCHEME-SERVICE.timeout-duration=5s
resilience4j.timelimiter.instances.SCHEME-SERVICE.cancel-running-future=true

# Circuit Breaker — SCHEME-SERVICE
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.sliding-window-size=10
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.register-health-indicator=true
resilience4j.circuitbreaker.instances.SCHEME-SERVICE.ignore-exceptions=com.cts.enrollment_service.exception.ResourceNotFoundException,com.cts.enrollment_service.exception.BadRequestException

# Health
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit Breaker — audit-management-service
resilience4j.circuitbreaker.instances.audit-management-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.audit-management-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.audit-management-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.audit-management-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.audit-management-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.audit-management-service.automatic-transition-from-open-to-half-open-enabled=true

# Circuit Breaker — compliance-service
resilience4j.circuitbreaker.instances.compliance-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.compliance-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.compliance-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.compliance-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.compliance-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.compliance-service.automatic-transition-from-open-to-half-open-enabled=true
