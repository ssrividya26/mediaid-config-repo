server.port=8087

app.upload.dir=uploads/claim-documents

spring.datasource.url=jdbc:mysql://localhost:3306/claim_service_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.cloud.openfeign.circuitbreaker.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

## CIRCUIT BREAKER
resilience4j.circuitbreaker.instances.claimExternal.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claimExternal.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.claimExternal.sliding-window-size=10
resilience4j.circuitbreaker.instances.claimExternal.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.claimExternal.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.claimExternal.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claimExternal.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.claimExternal.register-health-indicator=true
resilience4j.circuitbreaker.instances.claimExternal.ignoreExceptions=\
  com.cts.claim_service.exception.ResourceNotFoundException,\
  com.cts.claim_service.exception.BadRequestException

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit breaker â audit-management-service (audit log writes after claim events)
resilience4j.circuitbreaker.instances.audit-management-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.audit-management-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.audit-management-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.audit-management-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.audit-management-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.audit-management-service.automatic-transition-from-open-to-half-open-enabled=true



