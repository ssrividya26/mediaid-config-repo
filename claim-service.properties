resilience4j.timelimiter.instances.EnrollmentClientgetEnrollmentDetailsLongLong.cancelRunningFuture=false

resilience4j.timelimiter.instances.EnrollmentClientvalidateEnrollmentLongLong.timeoutDuration=10s
resilience4j.timelimiter.instances.EnrollmentClientvalidateEnrollmentLongLong.cancelRunningFuture=false

resilience4j.timelimiter.instances.DisbursementClientgetTotalUtilizedList.timeoutDuration=10s
